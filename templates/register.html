{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <i class="fas fa-user-plus fa-4x text-primary mb-3"></i>
                    <h2 class="fw-bold">Create Account</h2>
                </div>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control form-control-lg" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control form-control-lg" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold btn-lg">Register</button>
                </form>
                <p class="text-center mt-4 mb-0">Already have account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
